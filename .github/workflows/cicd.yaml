name: CI/CD (ECR -> EC2)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  CONTAINER_NAME: incident-commander
  HOST_PORT: "8000"
  CONTAINER_PORT: "8000"

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run tests
        run: python test_demo.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" >/dev/null

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        run: |
          echo "IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "IMAGE_URI_LATEST=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_URI }}
            ${{ env.IMAGE_URI_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_URI: ${{ env.IMAGE_URI }}
          AWS_REGION: ${{ env.AWS_REGION }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ env.HOST_PORT }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script: |
            set -eu
            echo "Deploying $IMAGE_URI"

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is not installed on the EC2 host" >&2
              exit 1
            fi

            if ! command -v aws >/dev/null 2>&1; then
              echo "aws cli is not installed on the EC2 host (required for ECR login)" >&2
              exit 1
            fi

            ECR_REGISTRY="$(echo "$IMAGE_URI" | cut -d/ -f1)"
            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            docker pull "$IMAGE_URI"

            if docker ps -a --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"; then
              docker stop "$CONTAINER_NAME" || true
              docker rm "$CONTAINER_NAME" || true
            fi

            ENV_FILE_ARGS=""
            if [ -n "${EC2_ENV_FILE:-}" ]; then
              if [ ! -f "$EC2_ENV_FILE" ]; then
                echo "EC2_ENV_FILE does not exist: $EC2_ENV_FILE" >&2
                exit 1
              fi
              ENV_FILE_ARGS="--env-file $EC2_ENV_FILE"
            fi

            # shellcheck disable=SC2086
            docker run -d --restart unless-stopped \
              --name "$CONTAINER_NAME" \
              -p "$HOST_PORT:$CONTAINER_PORT" \
              $ENV_FILE_ARGS \
              "$IMAGE_URI"

            docker image prune -f >/dev/null 2>&1 || true
